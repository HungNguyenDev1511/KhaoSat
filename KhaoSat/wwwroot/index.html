<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo Sát Thông Minh - Modern Survey App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showView('home')">
                <i class="bi bi-clipboard2-check-fill me-2"></i>SurveyPro
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" id="nav-home" href="javascript:void(0)" onclick="showView('home')">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="nav-admin" href="javascript:void(0)" onclick="showView('admin')">Quản trị</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container py-4">
        
        <!-- Home View: List Surveys -->
        <section id="home-view" class="view">
            <div class="row mb-4">
                <div class="col-12 text-center py-5 bg-white rounded-4 shadow-sm mb-4 hero-section">
                    <h1 class="display-5 fw-bold text-gradient">Khảo Sát Ý Kiến</h1>
                    <p class="lead text-secondary">Hãy giúp chúng tôi cải thiện dịch vụ bằng cách tham gia các bài khảo sát dưới đây.</p>
                </div>
            </div>
            <div id="survey-list" class="row g-4">
                <!-- Dynamic Content -->
            </div>
        </section>

        <!-- Take Survey View -->
        <section id="take-view" class="view hidden">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <button class="btn btn-link text-decoration-none mb-3 p-0" onclick="showView('home')">
                        <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách
                    </button>
                    <div id="survey-form-container" class="card border-0 shadow-lg rounded-4 overflow-hidden">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Admin View -->
        <section id="admin-view" class="view hidden">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4 fw-bold mb-0">Quản Lý Khảo Sát</h2>
                <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-2"></i>Thêm Mới
                </button>
            </div>
            <div id="admin-survey-list" class="row g-3">
                <!-- Dynamic Content -->
            </div>
        </section>

    </div>

    <!-- Modal for Create/Edit -->
    <div class="modal fade" id="surveyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modal-title">Thêm Khảo Sát</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="survey-editor-form">
                    <div class="modal-body">
                        <input type="hidden" id="edit-survey-id">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tiêu đề khảo sát</label>
                            <input type="text" id="survey-title" class="form-control form-control-lg rounded-3" required placeholder="VD: Khảo sát chất lượng đào tạo">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mô tả ngắn</label>
                            <textarea id="survey-description" class="form-control rounded-3" rows="2" placeholder="Nội dung giới thiệu về khảo sát này..."></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold text-primary mb-0"><i class="bi bi-list-task me-2"></i>Danh sách câu hỏi</h6>
                            <button type="button" class="btn btn-outline-primary btn-sm rounded-pill" onclick="addQuestionEditor()">
                                <i class="bi bi-plus-circle me-1"></i> Thêm câu hỏi
                            </button>
                        </div>
                        <div id="questions-list" class="accordion mb-3">
                            <!-- Dynamic Question Fields -->
                        </div>
                    </div>
                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-5 shadow">Lưu Lại</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0 rounded-pill shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">Thông báo!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
